{% extends "admin/admin_base.html" %}

{% block admin_content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card glass border-0 shadow-lg">
                <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Edit Installment</h5>
                    <a href="{{ url_for('admin.installments') }}" class="btn btn-sm btn-light">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">COURSE / YEAR</label>
                            <input type="text" class="form-control bg-light fw-bold"
                                value="{{ inst.course }} - Year {{ inst.year }}" disabled readonly>
                            <div class="form-text small">Course and Year cannot be changed to prevent data
                                inconsistency.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">LABEL</label>
                            <input type="text" name="label" class="form-control" value="{{ inst.label }}" required
                                placeholder="e.g. Semester 1">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">DUE DATE</label>
                            <input type="date" name="due_date" class="form-control" value="{{ inst.due_date }}"
                                required>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label small fw-bold text-muted">% OF FEE</label>
                                <div class="input-group">
                                    <input type="number" name="percentage" class="form-control"
                                        value="{{ inst.percentage }}" required min="1" max="100">
                                    <span class="input-group-text bg-transparent">%</span>
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold text-muted">LATE FEE/DAY</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0 bg-transparent">₹</span>
                                    <input type="number" name="late_fee" class="form-control border-start-0 ps-0"
                                        value="{{ inst.late_fee_per_day }}" required min="0">
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between gap-3 pt-2">
                            <a href="{{ url_for('admin.installments') }}" class="btn btn-light w-50">Cancel</a>
                            <button type="submit" class="btn btn-primary w-50">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

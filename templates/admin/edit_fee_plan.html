{% extends "admin/admin_base.html" %}

{% block admin_content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card glass border-0 shadow-lg">
                <div class="card-header bg-transparent border-0 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0">Edit Fee Plan</h5>
                    <a href="{{ url_for('admin.fee_plans') }}" class="btn btn-sm btn-light">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">COURSE</label>
                            <input type="text" class="form-control bg-light fw-bold"
                                value="{{ p.course }} - Year {{ p.year }}" disabled readonly>
                            <div class="form-text small">Course and Year cannot be changed. Delete & re-create if
                                needed.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">TUITION FEE</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0 bg-transparent">₹</span>
                                <input type="number" name="tuition" class="form-control border-start-0 ps-0"
                                    value="{{ p.tuition }}" required min="0">
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label small fw-bold text-muted">EXAM FEE</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0 bg-transparent">₹</span>
                                    <input type="number" name="exam" class="form-control border-start-0 ps-0"
                                        value="{{ p.exam }}" required min="0">
                                </div>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold text-muted">OTHER FEE</label>
                                <div class="input-group">
                                    <span class="input-group-text border-end-0 bg-transparent">₹</span>
                                    <input type="number" name="other" class="form-control border-start-0 ps-0"
                                        value="{{ p.other }}" required min="0">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">HOSTEL FEE</label>
                            <div class="input-group">
                                <span class="input-group-text border-end-0 bg-transparent">₹</span>
                                <input type="number" name="hostel" class="form-control border-start-0 ps-0"
                                    value="{{ p.hostel }}" required min="0">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between gap-3 pt-2">
                            <a href="{{ url_for('admin.fee_plans') }}" class="btn btn-light w-50">Cancel</a>
                            <button type="submit" class="btn btn-primary w-50">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

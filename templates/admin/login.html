{% extends "shared/layout.html" %}

{% block content %}
<div class="container d-flex flex-column justify-content-center min-vh-100">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
        <div class="card glass shadow-lg border-0 rounded-4 overflow-hidden">
          <div class="bg-primary p-4 text-center text-white">
            <div class="rounded-circle bg-white d-inline-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 70px; height: 70px;">
                <i class="fa-solid fa-shield-halved fa-2x text-primary"></i>
            </div>
            <h5 class="fw-bold mb-0">Secure Admin Access</h5>
            <small class="opacity-75 d-block">Institute Management Portal</small>
          </div>
          <div class="card-body p-4 p-md-5">

          <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="mb-3">
              <label class="form-label small fw-bold text-muted">USERNAME</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i
                    class="fa-solid fa-user text-muted"></i></span>
                <input class="form-control border-start-0 ps-0" name="username" required placeholder="admin">
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label small fw-bold text-muted">PASSWORD</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0"><i
                    class="fa-solid fa-lock text-muted"></i></span>
                <input type="password" class="form-control border-start-0 ps-0" name="password" required
                  placeholder="••••••">
              </div>
            </div>
            <div class="d-grid mt-4">
              <button class="btn btn-primary btn-lg py-2 rounded-pill shadow-sm fw-bold">Login to Dashboard</button>
            </div>
          </form>

          <div class="mt-4 text-center">
            <small class="text-muted">Demo: eng_admin / Admin@123</small>
          </div>
        </div>
      </div>
      <div class="text-center mt-3 text-muted small">
        &copy; 2026 Admin System
      </div>
    </div>
  </div>
</div>
{% endblock %}
